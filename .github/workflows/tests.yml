---
name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    name: bats (build-state + sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq, jq, bats
        run: |
          set -euo pipefail
          YQ_VERSION="v4.45.4"
          sudo curl -sSLf "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          sudo apt-get update -qq
          sudo apt-get install -y bats jq

      - name: Run bats tests
        run: bats --tap tests/
